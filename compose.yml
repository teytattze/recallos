# Local data stack for RecallOS.
#
#   INGESTION_MONGODB_URL=mongodb://localhost:27017/?replicaSet=rs0
#   INGESTION_MONGODB_DATABASE_NAME=recallos
#   KNOWLEDGE_VOYAGEAI_BASE_URL=http://localhost:4010/v1

services:
  mongo:
    image: mongo:8
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://localhost:27017/admin",
          "--eval",
          "try { rs.status().ok } catch (error) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok }",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mock:
    image: wiremock/wiremock:3.13.2
    ports:
      - "4010:8080"
    volumes:
      - ./tests/e2e-server/mock/mappings:/home/wiremock/mappings:ro

volumes:
  mongo-data:
