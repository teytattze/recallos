# Local AWS + Postgres stack for RecallOS.
#
# floci emulates the AWS surface (S3, SQS, CloudWatch Logs, EventBridge, Scheduler)
# on a single endpoint at http://localhost:4566. Use credentials test/test.
# Postgres runs as a dedicated pgvector container so HNSW / pgvector work locally
# (the consolidated-Aurora store relies on pgvector — see decision-records/server).
#
#   AWS_ENDPOINT_URL=http://localhost:4566
#   AWS_ACCESS_KEY_ID=test  AWS_SECRET_ACCESS_KEY=test  AWS_REGION=us-east-1
#   DATABASE_URL=postgres://recallos:recallos@localhost:5432/recallos

services:
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    environment:
      # Persist emulated state across restarts (state lives in the floci-data volume).
      FLOCI_STORAGE_MODE: hybrid
      # Network that container-backed services (Lambda/RDS/etc.) are attached to;
      # must match this compose project's network name (set below).
      FLOCI_SERVICES_DOCKER_NETWORK: recallos
    volumes:
      # Lets floci run real engine containers for container-backed services.
      - /var/run/docker.sock:/var/run/docker.sock
      - floci-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_floci/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: recallos
      POSTGRES_PASSWORD: recallos
      POSTGRES_DB: recallos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recallos -d recallos"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  # Fix the network name so FLOCI_SERVICES_DOCKER_NETWORK is deterministic
  # regardless of the compose project name.
  default:
    name: recallos

volumes:
  floci-data:
  postgres-data:
