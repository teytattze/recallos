name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

env:
  BUN_VERSION: "1.3.14"

permissions:
  contents: read
  packages: write

jobs:
  build_artifact:
    name: Build ${{ matrix.app }} artifact
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: server-api-service
            build_dir: dist
          - app: server-knowledge-worker
            build_dir: dist
          - app: server-ingestion-worker
            build_dir: dist
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            apps/${{ matrix.app }}/node_modules
          key: ${{ runner.os }}-bun-${{ matrix.app }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ matrix.app }}-

      - name: Install dependencies
        run: bun install

      - name: Run ${{ matrix.app }} unit tests
        run: bun run test --filter ./apps/${{ matrix.app }}

      - name: Build ${{ matrix.app }}
        run: bun run build --filter ./apps/${{ matrix.app }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.app }}-build
          path: apps/${{ matrix.app }}/${{ matrix.build_dir }}
          include-hidden-files: true
          retention-days: 1

  publish_image:
    name: Publish ${{ matrix.app }} image
    runs-on: ubuntu-latest
    needs: build_artifact
    if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - app: server-api-service
            build_dir: dist
          - app: server-ingestion-worker
            build_dir: dist
          - app: server-knowledge-worker
            build_dir: dist
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version
        id: extract-version
        uses: ./.github/actions/extract-version

      - name: Resolve registry owner
        id: registry
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.app }}-build
          path: apps/${{ matrix.app }}/${{ matrix.build_dir }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -f dockers/Dockerfile.${{ matrix.app }} \
            -t ghcr.io/${{ steps.registry.outputs.owner }}/${{ matrix.app }}:${{ steps.extract-version.outputs.version }} \
            apps/${{ matrix.app }}
          docker push ghcr.io/${{ steps.registry.outputs.owner }}/${{ matrix.app }}:${{ steps.extract-version.outputs.version }}
